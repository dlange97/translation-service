name: Auto PR To Main

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    env:
      AUTO_PR_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}

    steps:
      - name: Skip when AUTO_PR_TOKEN is missing
        if: ${{ env.AUTO_PR_TOKEN == '' }}
        run: |
          echo "Missing AUTO_PR_TOKEN secret."
          echo "Create a classic PAT or fine-grained token with pull request write access and save it as AUTO_PR_TOKEN."

      - name: Create or reuse PR to main
        if: ${{ env.AUTO_PR_TOKEN != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.AUTO_PR_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = context.ref.replace('refs/heads/', '');

            if (head === 'main') {
              core.info('Current branch is main; nothing to do.');
              return;
            }

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${head}`,
              base: 'main',
            });

            if (existing.data.length > 0) {
              core.info(`Open PR already exists: #${existing.data[0].number}`);
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title: `Auto PR: ${head} -> main`,
              head,
              base: 'main',
              body: 'Automatycznie utworzony PR z brancha roboczego do main.',
            });

            core.info(`Created PR #${created.data.number}`);

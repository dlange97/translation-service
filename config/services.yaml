# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
  app.translation.supported_locales: ["en", "pl"]
  app.translation.default_locale: "en"

services:
  # default configuration for services in *this* file
  _defaults:
    autowire: true # Automatically injects dependencies in your services.
    autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

  # makes classes in src/ available to be used as services
  # this creates a service per class whose id is the fully-qualified class name
  App\:
    resource: "../src/"
    exclude:
      - "../src/DependencyInjection/"
      - "../src/Entity/"
      - "../src/Kernel.php"

  App\Service\Locale\ConfiguredLocaleStrategy:
    arguments:
      $supportedLocales: "%app.translation.supported_locales%"
      $defaultLocale: "%app.translation.default_locale%"

  App\Service\Locale\LocaleStrategyInterface: '@App\Service\Locale\ConfiguredLocaleStrategy'

  # add more service definitions when explicit configuration is needed
  # please note that last definitions always *replace* previous ones

  # ── Instance ID request listener ─────────────────────────
  App\EventListener\InstanceRequestListener:
    tags:
      - {
          name: kernel.event_listener,
          event: kernel.request,
          method: onKernelRequest,
          priority: 20,
        }

  # ── Instance ID Doctrine listener ────────────────────────
  App\EventListener\InstanceDoctrineListener:
    tags:
      - { name: doctrine.event_listener, event: prePersist }

  # ── Rate-limit subscriber (DDoS / brute-force protection) ─
  App\EventSubscriber\RateLimitSubscriber:
    arguments:
      $apiLimiter: "@limiter.api"
      $apiSensitiveLimiter: "@limiter.api_sensitive"
    tags:
      - { name: kernel.event_subscriber }
